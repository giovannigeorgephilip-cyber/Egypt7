<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book your Trip to Egypt!</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div class="image"></div>
      <nav>
        <a href="index.html">Home</a>
        <a href="attractions.html">Attractions</a>
        <a href="food.html">Food</a>
        <a href="music.html">Music</a>
        <a href="">Book your Trip</a>
        <a href="gallery.html">Gallery</a>
      </nav>
      <video
        src="./Images/Screen Recording (07-03-2026 01-37-57 م).wmv"
      ></video>
    </header>

    <main class="attract">
      <h1>Book Your Trip and visit Egypt</h1>
      <form>
        <label for="fullname"> Fullname: </label>
        <input type="text" id="fullname" required />

        <label for="password">Password</label>
        <input type="password" id="password" required />

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" required placeholder="Phone Number" />

        <label>Gender</label>
        <div class="radio-group">
          <label for="male"
            ><input type="radio" name="Gender" id="male" />Male</label
          >
          <label for="female"
            ><input type="radio" name="Gender" id="female" />Female</label
          >
        </div>

        <label for="arrival">Arrival Date</label>
        <input type="date" id="arrival" name="arrival_date" />
        <label for="profilePic">Profile Picture</label>
        <input type="file" id="profilePic" name="profile_picture" />
        <label for="passport">Passport</label>
        <input type="file" id="passport" name="passport" />
        <label for="visa">Visa</label>
        <input type="file" id="visa" name="visa" />
        <label for="destination">Where would you like to travel?</label>
        <select id="destination" name="destination">
          <option value="">Choose one</option>
          <option value="cairo">Cairo</option>
          <option value="luxor">Luxor</option>
          <option value="alexandria">Alexandria</option>
        </select>
        <label>Services you need</label>
        <div class="checkbox-group">
          <label for="tickets">
            <input
              type="checkbox"
              id="tickets"
              name="services"
              value="tickets"
            />
            Airline Tickets
          </label>
          <label for="car">
            <input type="checkbox" id="car" name="services" value="car" />
            Rental Car
          </label>
          <label for="hotel">
            <input type="checkbox" id="hotel" name="services" value="hotel" />
            Hotel Accommodation
          </label>
        </div>
        <label for="notes">Additional Notes</label>
        <textarea id="notes" name="notes" rows="6"></textarea>
        <button type="submit">Submit</button>
      </form>
    </main>
    <footer><p>&copy; 2026 Egypt ❤️. All rights reserved.</p></footer>
  </body>
</html>
